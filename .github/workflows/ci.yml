name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|perf|refactor|docs|test|build|ci|chore)(\([[:alnum:]_.\/-]+\))?!?: .+$'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "Pull request titles must use Conventional Commits, for example: feat: add price alerts"
            exit 1
          fi
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
